name: cabal
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
jobs:
  fourmolu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
  build:
    runs-on: ubuntu-latest
    needs: fourmolu
    strategy:
      matrix:
        cabal: ["latest"]
        ghc: ["8.10.7", "9.0.2", "9.2.8", "9.4.8", "9.6", "9.8", "9.10", "9.12"]
        package:
          - "icloud-auth"
    env:
      CONFIG: "--enable-tests"
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        id: setup-haskell-cabal
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: ${{ matrix.cabal }}
      - run: cabal update
      - run: cabal freeze $CONFIG
      - uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup-haskell-cabal.outputs.cabal-store }}
            dist-newstyle
          key: ${{ runner.os }}-${{ matrix.ghc }}-${{ matrix.package }}-${{ hashFiles('cabal.project.freeze') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.ghc }}-${{ matrix.package }}-
      - run: cabal build ${{ matrix.package }} $CONFIG
      - run: cabal test "${{ matrix.package }}:test"
      - run: cabal haddock ${{ matrix.package }}
      - run: cabal sdist

  build-latest:
    runs-on: ubuntu-latest
    needs: fourmolu
    env:
      CONFIG: "--enable-tests"
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.12"
          cabal-version: "latest"
      - run: cabal update
      - run: cabal build $CONFIG
      - run: cabal test $CONFIG
